# Only allow releases from the main branch
allow-branch = ["main"]

# Do not publish to crates.io — this is an internal tool
publish = false

# Generate CHANGELOG.md before cargo-release makes its version bump commit.
# cargo-release uses "git commit -am" which only stages already-tracked files.
# We must run "git add CHANGELOG.md" explicitly so that a newly created
# CHANGELOG.md is included in the release commit.
# {{version}} is replaced by cargo-release with the new version (e.g. "0.2.0").
pre-release-hook = [
  "sh", "-c",
  "git-cliff --config .config/cliff.toml --tag {{version}} --output CHANGELOG.md && git add CHANGELOG.md"
]

# Replace version references in README.md.
# cargo-release stages and commits these changes together with Cargo.toml
# and CHANGELOG.md in the single release commit.
[[pre-release-replacements]]
file    = "README.md"
search  = "v[0-9]+\\.[0-9]+\\.[0-9]+"
replace = "v{{version}}"
exactly = 2
