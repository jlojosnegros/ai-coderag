[advisories]
unmaintained = "all"
ignore = [
    # paste is archived by its author (dtolnay), used by datafusion (lancedb dep).
    # No upgrade available; ignoring since we cannot control this transitive dependency.
    "RUSTSEC-2024-0436",
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",       # option-ext, transitive dep via fastembed → hf-hub → dirs → dirs-sys
    "NCSA",          # libfuzzer-sys, transitive dep via fastembed → image → ravif → rav1e
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
allow-wildcard-paths = true
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
